<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../assets/studynest_logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>StudyNest - Weekly</title>

  <link rel="stylesheet" href="../styles/weekly.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <script type="module" src="../scripts/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="container">

    <div class="card header" style="align-items: center;">
      <div style="display: flex; align-items: center; gap: 15px;">
        <a href="dashboard.html"
          style="text-decoration: none; color: #3a1f6e; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: #f5f0fb; transition: all 0.3s ease;"
          onmouseover="this.style.background='#e3d5f5'; this.style.transform='translateX(-3px)'"
          onmouseout="this.style.background='#f5f0fb'; this.style.transform='translateX(0)'">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-arrow-left">
            <path d="m12 19-7-7 7-7" />
            <path d="M19 12H5" />
          </svg>
        </a>
        <h2 style="margin: 0;">Weekly</h2>
      </div>
      <div id="weekInfo" style="margin: 0; color: #666; font-weight: 600; text-align: right; line-height: 1.2;"></div>
    </div>

    <div class="card streak">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin: 0;">🔥 Streak</h3>
        <div style="font-size: 22px; font-weight: 700; color: #FFC107;"><span id="streakNumber">0</span> <span
            style="font-size: 13px; color: #888; font-weight: 500;">days</span></div>
      </div>
      <div id="streakRow"></div>
    </div>

    <div class="top">

      <div class="card">
        <h3>Tasks Completed</h3>
        <canvas id="taskChart"></canvas>
      </div>

      <div class="card center">
        <div id="progressCircle" class="circle">0%t</div>
      </div>

      <div class="card">
        <h3>Weekly Avg</h3>
        <canvas id="avgChart"></canvas>
      </div>

    </div>

    <div id="daysContainer"></div>

  </div>

  <script type="module" src="../scripts/weekly.js"></script>
</body>

</html>
