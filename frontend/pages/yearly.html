<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../assets/studynest_logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyNest - Yearly</title>
  <link rel="stylesheet" href="../styles/yearly.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script type="module" src="../scripts/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="container">

    <div class="card header">
      <div class="header-left">
        <a href="dashboard.html" class="back-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 19-7-7 7-7" />
            <path d="M19 12H5" />
          </svg>
        </a>
        <h2>Yearly</h2>
      </div>
      <div class="header-right">
        <div class="year-label" id="yearLabel"></div>
        <div class="year-sub" id="yearSub"></div>
        <div style="font-size: 13px; font-weight: 600; color: #FFC107; margin-top: 4px;">
          🔥 <span id="streakNumber">0</span>
          <span style="color: #888; font-weight: 500;">day streak</span>
        </div>
      </div>
    </div>

    <div class="top">

      <div class="card center">
        <div class="circle" id="progressCircle">0%</div>
        <div class="circle-label">Yearly Progress</div>
      </div>

      <div class="card">
        <h3>Yearly Average</h3>
        <canvas id="avgMoodChart"></canvas>
      </div>

      <div class="card">
        <h3>Tasks Completed</h3>
        <canvas id="yearlyTaskChart"></canvas>
      </div>

    </div>

    <div id="monthsContainer"></div>

  </div>
  <script type="module" src="../scripts/yearly.js"></script>
</body>

</html>
