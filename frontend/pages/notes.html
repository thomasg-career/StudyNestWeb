<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../assets/studynest_logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyNest - Notes</title>

  <link rel="stylesheet" href="../styles/notes.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script type="module" src="../scripts/api.js"></script>
</head>
<body>
  <div class="container">
    <div class="card header" style="align-items: center;">
      <div style="display: flex; align-items: center; gap: 15px;">
        <a href="dashboard.html"
          style="text-decoration: none; color: #3a1f6e; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: #f5f0fb; transition: all 0.3s ease;"
          onmouseover="this.style.background='#e3d5f5'; this.style.transform='translateX(-3px)'"
          onmouseout="this.style.background='#f5f0fb'; this.style.transform='translateX(0)'">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 19-7-7 7-7" />
            <path d="M19 12H5" />
          </svg>
        </a>
        <h1 style="margin: 0;">My Notes</h1>
      </div>
    </div>

    <div class="notes-grid" id="notesGrid">
       <div style="text-align: center; color: #777; width: 100%; padding: 2rem;">Loading notes...</div>
    </div>

    <div id="noteModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeNote()">&times;</span>
        <div id="modalDate" class="note-date" style="font-size: 1rem; color: #5c531d;"></div>
        <div id="modalText" class="full-text"></div>
      </div>
    </div>
  </div>

  <script type="module" src="../scripts/notes.js"></script>
</body>
</html>
